name: Build and Package

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-13, macos-latest]
        include:
          - os: windows-latest
            executable_name: "Sagami Youtube Downloader.exe"
            artifact_name: "Windows-x64-Installer"
            zip_name: "Sagami-Youtube-Downloader-Windows-x64.zip"
          - os: ubuntu-latest
            executable_name: "Sagami-Youtube-Downloader-Linux-x86_64"
            artifact_name: "Linux-x86_64-Package"
            zip_name: "Sagami-Youtube-Downloader-Linux-x86_64.zip"
          - os: macos-13
            executable_name: "Sagami Youtube Downloader"
            artifact_name: "macOS-x86_64-Package"
            zip_name: "Sagami-Youtube-Downloader-macOS-x86_64.zip"
          - os: macos-latest
            executable_name: "Sagami Youtube Downloader"
            artifact_name: "macOS-AppleSilicon-Package"
            zip_name: "Sagami-Youtube-Downloader-macOS-AppleSilicon.zip"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Get Version from main.py
        id: get_version
        shell: bash
        run: |
          VERSION=$(python -c "import re; content = open('main.py', encoding='utf-8').read(); print(re.search(r'VERSION\s*=\s*\"([^\"]+)\"', content).group(1))")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Detected version: $VERSION"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xinput0 libxcb-shape0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Prepare binaries (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -L -f https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o yt-dlp
          curl -L -f https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v4.4.1/ffmpeg-4.4.1-linux-64.zip -o ffmpeg.zip
          curl -L -f https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v4.4.1/ffprobe-4.4.1-linux-64.zip -o ffprobe.zip
          unzip -o ffmpeg.zip
          unzip -o ffprobe.zip
          chmod +x yt-dlp ffmpeg ffprobe
          rm ffmpeg.zip ffprobe.zip

      - name: Prepare binaries (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -L -f https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o yt-dlp
          curl -L -f https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v4.4.1/ffmpeg-4.4.1-osx-64.zip -o ffmpeg.zip
          curl -L -f https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v4.4.1/ffprobe-4.4.1-osx-64.zip -o ffprobe.zip
          unzip -o ffmpeg.zip
          unzip -o ffprobe.zip
          chmod +x yt-dlp ffmpeg ffprobe
          rm ffmpeg.zip ffprobe.zip

      - name: Build with Nuitka (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m nuitka --standalone --disable-cache=all --assume-yes-for-downloads --enable-plugin=pyqt6 --windows-console-mode=disable --windows-icon-from-ico="Sagami Youtube Downloader.ico" --output-dir="nuitka_dist" --output-filename="Sagami Youtube Downloader.exe" --include-data-file="Sagami Youtube Downloader.ico=Sagami Youtube Downloader.ico" --include-data-file=yt-dlp.exe=yt-dlp.exe --include-data-file=ffmpeg.exe=ffmpeg.exe --include-data-file=ffprobe.exe=ffprobe.exe --include-data-dir=language=language main.py

      - name: Build with PyInstaller (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller --noconfirm --onefile --windowed \
            --add-data "language:language" \
            --add-binary "yt-dlp:." \
            --add-binary "ffmpeg:." \
            --add-binary "ffprobe:." \
            --name "${{ matrix.executable_name }}" \
            main.py

      - name: Build with PyInstaller (macOS)
        if: runner.os == 'macOS'
        run: |
          # Macは正しい .app 形式にするため --onedir (デフォルト) を使用
          pyinstaller --noconfirm --onedir --windowed \
            --add-data "language:language" \
            --add-binary "yt-dlp:." \
            --add-binary "ffmpeg:." \
            --add-binary "ffprobe:." \
            --name "${{ matrix.executable_name }}" \
            main.py
          
          # .app フォルダ内の全ファイルに再帰的に署名を施す
          find "dist/${{ matrix.executable_name }}.app" -type f \( -name "*.so" -o -name "*.dylib" -o -name "python" -o -name "${{ matrix.executable_name }}" \) -exec codesign --force --sign - {} \;
          codesign --force --deep --sign - "dist/${{ matrix.executable_name }}.app"

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (!(Test-Path "dist-package")) { New-Item -ItemType Directory "dist-package" }
          xcopy /E /I /Y "nuitka_dist\main.dist\*" "dist-package\"
          Copy-Item -Path "Sagami Youtube Downloader.ico" -Destination "dist-package\" -Force

      - name: Package artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist-package
          cp dist/"${{ matrix.executable_name }}" dist-package/
          echo "Linuxで実行するには:" > dist-package/README_Linux.txt
          echo "1. ターミナルを開く" >> dist-package/README_Linux.txt
          echo "2. chmod +x ./${{ matrix.executable_name }} を実行" >> dist-package/README_Linux.txt
          echo "3. ./${{ matrix.executable_name }} で起動" >> dist-package/README_Linux.txt
          zip -j "${{ matrix.zip_name }}" dist-package/*

      - name: Package artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist-package
          # 正式な .app フォルダをコピー
          cp -r "dist/${{ matrix.executable_name }}.app" dist-package/
          
          echo "macOSで実行するには:" > dist-package/README_macOS.txt
          echo "1. アプリを右クリックして「開く」を選択してください。" >> dist-package/README_macOS.txt
          echo "2. ブロックされる場合は「システム設定 > プライバシーとセキュリティ」で許可するか、" >> dist-package/README_macOS.txt
          echo "   以下をターミナルで実行してください:" >> dist-package/README_macOS.txt
          echo "   sudo xattr -cr \"${{ matrix.executable_name }}.app\"" >> dist-package/README_macOS.txt
          
          zip -r "${{ matrix.zip_name }}" dist-package/

      - name: Build Inno Setup Installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $targetPath = (Resolve-Path "dist-package").Path
          $issContent = @"
          [Setup]
          AppId={{D6C8E8C6-9E50-4F2E-A8E0-7C34A3F6D1B2}
          AppName=Sagami Youtube Downloader
          AppVersion=$($env:APP_VERSION)
          AppPublisher=sagami121
          AppPublisherURL=https://github.com/sagami121/Sagami-Youtube-Downloader
          DefaultDirName={autopf}\Sagami Youtube Downloader
          DefaultGroupName=Sagami Youtube Downloader
          OutputBaseFilename=SagamiYoutubeDownloader_v$($env:APP_VERSION)_Setup
          UninstallDisplayIcon={app}\Sagami Youtube Downloader.exe
          CreateUninstallRegKey=yes
          DisableDirPage=no
          UsePreviousAppDir=no
          PrivilegesRequired=admin
          UsedUserAreasWarning=no
          CloseApplications=yes

          [Tasks]
          Name: "desktopicon"; Description: "デスクトップにショートカットを作成"; GroupDescription: "追加アイコン:"; Flags: unchecked

          [Languages]
          Name: "ja"; MessagesFile: "compiler:Languages\Japanese.isl"

          [Files]
          Source: "$targetPath\*"; DestDir: "{app}"; Flags: recursesubdirs createallsubdirs ignoreversion

          [Icons]
          Name: "{autoprograms}\Sagami Youtube Downloader"; Filename: "{app}\Sagami Youtube Downloader.exe"
          Name: "{autodesktop}\Sagami Youtube Downloader"; Filename: "{app}\Sagami Youtube Downloader.exe"; Tasks: desktopicon

          [Run]
          Filename: "{app}\Sagami Youtube Downloader.exe"; Description: "Sagami Youtube Downloader を実行する"; Flags: nowait postinstall skipifsilent

          [UninstallDelete]
          Type: filesandordirs; Name: "{app}\*"
          Type: dirifempty; Name: "{app}"
          Type: filesandordirs; Name: "{userappdata}\SagamiYoutubeDownloader\*"
          Type: dirifempty; Name: "{userappdata}\SagamiYoutubeDownloader"
          "@
          
          $issContent | Out-File -FilePath "generated_installer.iss" -Encoding utf8
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "generated_installer.iss" /O"installer-output"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            installer-output/*.exe
            *.zip
