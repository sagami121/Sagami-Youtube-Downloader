name: Build and Package

on:
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            executable_name: "Sagami Youtube Downloader.exe"
            artifact_name: "Windows-x64-Installer"
            zip_name: "Sagami-Youtube-Downloader-Windows-x64.zip"
          - os: ubuntu-latest
            executable_name: "Sagami-Youtube-Downloader-Linux-x86_64"
            artifact_name: "Linux-x86_64-Package"
            zip_name: "Sagami-Youtube-Downloader-Linux-x86_64.zip"
          - os: macos-latest
            executable_name: "Sagami Youtube Downloader"
            artifact_name: "macOS-Universal-Package"
            zip_name: "Sagami-Youtube-Downloader-macOS-Universal.zip"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache build tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pyinstaller
            ~/.cache/nuitka
          key: ${{ runner.os }}-buildcache

      - name: Cache binaries
        uses: actions/cache@v4
        with:
          path: |
            yt-dlp
            yt-dlp.exe
            ffmpeg
            ffmpeg.exe
            ffprobe
            ffprobe.exe
          key: ${{ runner.os }}-binaries

      - name: Get Version from main.py
        id: get_version
        shell: bash
        run: |
          VERSION=$(python -c "import re; content = open('main.py', encoding='utf-8').read(); print(re.search(r'VERSION\s*=\s*\"([^\"]+)\"', content).group(1))")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Detected version: $VERSION"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xinput0 libxcb-shape0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller nuitka

      - name: Prepare binaries (Linux)
        if: runner.os == 'Linux'
        run: |
          if [ ! -f yt-dlp ]; then
            curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o yt-dlp
          fi
          if [ ! -f ffmpeg ]; then
            curl -L https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v4.4.1/ffmpeg-4.4.1-linux-64.zip -o ffmpeg.zip
            unzip -o ffmpeg.zip
            rm ffmpeg.zip
          fi
          if [ ! -f ffprobe ]; then
            curl -L https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v4.4.1/ffprobe-4.4.1-linux-64.zip -o ffprobe.zip
            unzip -o ffprobe.zip
            rm ffprobe.zip
          fi
          chmod +x yt-dlp ffmpeg ffprobe

      - name: Prepare binaries (macOS)
        if: runner.os == 'macOS'
        run: |
          if [ ! -f yt-dlp ]; then
            curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o yt-dlp
          fi
          if [ ! -f ffmpeg ]; then
            curl -L https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v4.4.1/ffmpeg-4.4.1-osx-64.zip -o ffmpeg.zip
            unzip -o ffmpeg.zip
            rm ffmpeg.zip
          fi
          if [ ! -f ffprobe ]; then
            curl -L https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v4.4.1/ffprobe-4.4.1-osx-64.zip -o ffprobe.zip
            unzip -o ffprobe.zip
            rm ffprobe.zip
          fi
          chmod +x yt-dlp ffmpeg ffprobe

      - name: Build with Nuitka (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m nuitka --standalone --assume-yes-for-downloads --enable-plugin=pyqt6 --windows-console-mode=disable --windows-icon-from-ico="Sagami Youtube Downloader.ico" --output-dir="nuitka_dist" --output-filename="Sagami Youtube Downloader.exe" --include-data-file="Sagami Youtube Downloader.ico=Sagami Youtube Downloader.ico" --include-data-file=yt-dlp.exe=yt-dlp.exe --include-data-file=ffmpeg.exe=ffmpeg.exe --include-data-file=ffprobe.exe=ffprobe.exe --include-data-dir=language=language main.py

      - name: Build with PyInstaller (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller --noconfirm --onefile --windowed \
            --add-data "language:language" \
            --add-binary "yt-dlp:." \
            --add-binary "ffmpeg:." \
            --add-binary "ffprobe:." \
            --name "${{ matrix.executable_name }}" \
            main.py

      - name: Build with PyInstaller (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --noconfirm --onedir --windowed \
            --target-arch universal2 \
            --add-data "language:language" \
            --add-binary "yt-dlp:." \
            --add-binary "ffmpeg:." \
            --add-binary "ffprobe:." \
            --name "${{ matrix.executable_name }}" \
            main.py

          find "dist/${{ matrix.executable_name }}.app" -type f \( -name "*.so" -o -name "*.dylib" -o -name "python" -o -name "${{ matrix.executable_name }}" \) -exec codesign --force --sign - {} \;
          codesign --force --deep --sign - "dist/${{ matrix.executable_name }}.app"

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (!(Test-Path "dist-package")) { New-Item -ItemType Directory "dist-package" }
          xcopy /E /I /Y "nuitka_dist\main.dist\*" "dist-package\"
          Copy-Item -Path "Sagami Youtube Downloader.ico" -Destination "dist-package\" -Force

      - name: Package artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist-package
          cp dist/"${{ matrix.executable_name }}" dist-package/
          zip -1 -j "${{ matrix.zip_name }}" dist-package/*

      - name: Package artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist-package
          cp -r "dist/${{ matrix.executable_name }}.app" dist-package/
          zip -1 -r "${{ matrix.zip_name }}" dist-package/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            installer-output/*.exe
            *.zip