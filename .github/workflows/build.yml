name: Build and Package

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            executable_name: "Sagami Youtube Downloader.exe"
            artifact_prefix: "Sagami-Youtube-Downloader-Windows"
          - os: ubuntu-latest
            executable_name: "Sagami Youtube Downloader"
            artifact_prefix: "Sagami-Youtube-Downloader-Linux"
          - os: macos-latest
            executable_name: "Sagami Youtube Downloader"
            artifact_prefix: "Sagami-Youtube-Downloader-macOS"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Get Version from main.py
        id: get_version
        shell: bash
        run: |
          VERSION=$(python -c "import re; content = open('main.py', encoding='utf-8').read(); print(re.search(r'VERSION\s*=\s*\"([^\"]+)\"', content).group(1))")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Detected version: $VERSION"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xinput0 libxcb-shape0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare binaries (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -L -f https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o yt-dlp
          curl -L -f https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v4.4.1/ffmpeg-4.4.1-linux-64.zip -o ffmpeg.zip
          curl -L -f https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v4.4.1/ffprobe-4.4.1-linux-64.zip -o ffprobe.zip
          unzip -o ffmpeg.zip
          unzip -o ffprobe.zip
          chmod +x yt-dlp ffmpeg ffprobe
          rm ffmpeg.zip ffprobe.zip

      - name: Prepare binaries (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -L -f https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o yt-dlp
          curl -L -f https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v4.4.1/ffmpeg-4.4.1-osx-64.zip -o ffmpeg.zip
          curl -L -f https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v4.4.1/ffprobe-4.4.1-osx-64.zip -o ffprobe.zip
          unzip -o ffmpeg.zip
          unzip -o ffprobe.zip
          chmod +x yt-dlp ffmpeg ffprobe
          rm ffmpeg.zip ffprobe.zip

      - name: Build with Nuitka (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m nuitka --standalone --disable-cache=all --assume-yes-for-downloads --enable-plugin=pyqt6 --windows-console-mode=disable --windows-icon-from-ico="Sagami Youtube Downloader.ico" --output-dir="nuitka_dist" --output-filename="${{ matrix.executable_name }}" --include-data-file="Sagami Youtube Downloader.ico=Sagami Youtube Downloader.ico" --include-data-file=yt-dlp.exe=yt-dlp.exe --include-data-file=ffmpeg.exe=ffmpeg.exe --include-data-file=ffprobe.exe=ffprobe.exe --include-data-dir=language=language main.py

      - name: Build with Nuitka (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          python -m nuitka --standalone --disable-cache=all --assume-yes-for-downloads --enable-plugin=pyqt6 --output-dir="nuitka_dist" --output-filename="${{ matrix.executable_name }}" --include-data-file=yt-dlp=yt-dlp --include-data-file=ffmpeg=ffmpeg --include-data-file=ffprobe=ffprobe --include-data-dir=language=language main.py

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        run: |
          if (!(Test-Path "dist-package")) { New-Item -ItemType Directory "dist-package" }
          xcopy /E /I /Y "nuitka_dist\main.dist\*" "dist-package\"
          copy /Y "Sagami Youtube Downloader.ico" "dist-package\"

      - name: Package artifacts (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist-package
          cp -r nuitka_dist/main.dist/* dist-package/

      - name: Build Inno Setup Installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $targetPath = (Resolve-Path "dist-package").Path
          $issContent = @"
          [Setup]
          AppId={{D6C8E8C6-9E50-4F2E-A8E0-7C34A3F6D1B2}
          AppName=Sagami Youtube Downloader
          AppVersion=$($env:APP_VERSION)
          AppPublisher=sagami121
          AppPublisherURL=https://github.com/sagami121/Sagami-Youtube-Downloader
          DefaultDirName={autopf}\Sagami Youtube Downloader
          DefaultGroupName=Sagami Youtube Downloader
          OutputBaseFilename=SagamiYoutubeDownloader_v$($env:APP_VERSION)_Setup
          UninstallDisplayIcon={app}\Sagami Youtube Downloader.exe
          CreateUninstallRegKey=yes
          DisableDirPage=no
          UsePreviousAppDir=no
          PrivilegesRequired=admin
          UsedUserAreasWarning=no
          CloseApplications=yes

          [Tasks]
          Name: "desktopicon"; Description: "デスクトップにショートカットを作成"; GroupDescription: "追加アイコン:"; Flags: unchecked

          [Languages]
          Name: "ja"; MessagesFile: "compiler:Languages\Japanese.isl"

          [Files]
          Source: "$targetPath\*"; DestDir: "{app}"; Flags: recursesubdirs createallsubdirs ignoreversion

          [Icons]
          Name: "{autoprograms}\Sagami Youtube Downloader"; Filename: "{app}\Sagami Youtube Downloader.exe"
          Name: "{autodesktop}\Sagami Youtube Downloader"; Filename: "{app}\Sagami Youtube Downloader.exe"; Tasks: desktopicon

          [Run]
          Filename: "{app}\Sagami Youtube Downloader.exe"; Description: "Sagami Youtube Downloader を実行する"; Flags: nowait postinstall skipifsilent

          [UninstallDelete]
          Type: filesandordirs; Name: "{app}\*"
          Type: dirifempty; Name: "{app}"
          Type: filesandordirs; Name: "{userappdata}\SagamiYoutubeDownloader\*"
          Type: dirifempty; Name: "{userappdata}\SagamiYoutubeDownloader"
          "@
          
          $issContent | Out-File -FilePath "generated_installer.iss" -Encoding utf8
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "generated_installer.iss" /O"installer-output"

      - name: Upload Installer (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Sagami-Youtube-Downloader-Installer-v${{ steps.get_version.outputs.version }}
          path: installer-output/*.exe

      - name: Upload Binaries Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_prefix }}-v${{ steps.get_version.outputs.version }}
          path: dist-package/
